name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout runtime
        uses: actions/checkout@v4
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate package
        run: npm run pack:dry-run

      - name: Run tests
        run: npm test
        env:
          COMPOSER_HOME: ${{ runner.temp }}/composer-home
          SKIR_RUNTIME_PATH: ${{ github.workspace }}/runtime

      - name: Create publish tarball
        run: |
          mkdir -p build/package
          npm pack --ignore-scripts --pack-destination build/package --cache .npm-cache

      - name: Upload publish tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: build/package/skir-laravel-data-generator-*.tgz
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download publish tarball
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: build/package

      - name: Publish
        run: npm publish build/package/skir-laravel-data-generator-*.tgz --ignore-scripts --provenance --access public
